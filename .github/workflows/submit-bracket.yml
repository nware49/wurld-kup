name: Process bracket submission

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write

concurrency:
  group: repo-data-writes
  cancel-in-progress: false

jobs:
  process:
    # Gate on body content rather than labels: template labels are only
    # auto-applied when they already exist in the repo, so a fresh repo would
    # silently skip every submission if we required the label.
    if: >-
      contains(github.event.issue.body, '### Bracket payload') ||
      contains(github.event.issue.labels.*.name, 'bracket-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate and store bracket
        id: process
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          ISSUE_UPDATED_AT: ${{ github.event.issue.updated_at }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: node scripts/process-submission.mjs

      - name: Commit prediction
        if: steps.process.outputs.status == 'ok'
        run: |
          git config user.name "bracket-bot"
          git config user.email "actions@github.com"
          git add data/predictions
          if git diff --cached --quiet; then
            echo "No changes to commit (identical resubmission)."
            exit 0
          fi
          git commit -m "Add bracket submission from @${{ github.event.issue.user.login }} (#${{ github.event.issue.number }})"
          for i in 1 2 3 4; do
            git push origin main && exit 0
            git pull --rebase origin main
            sleep $((2 ** i))
          done
          git push origin main

      - name: Reply and close
        uses: actions/github-script@v7
        if: always() && steps.process.outputs.status != ''
        env:
          MESSAGE: ${{ steps.process.outputs.message }}
          STATUS: ${{ steps.process.outputs.status }}
        with:
          script: |
            const ok = process.env.STATUS === 'ok';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: process.env.MESSAGE,
            });
            if (ok) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
            }
