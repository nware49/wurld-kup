name: Fetch live results

# Polls football-data.org for finished matches and merges them into
# data/results.json (manual entries always win — see scripts/fetch-results.mjs).
# Requires the FOOTBALL_DATA_TOKEN repo secret; without it each run is a
# harmless no-op. The cron windows cover the tournament (Jun 11 – Jul 19);
# outside it the API reports no new finished matches, so nothing is committed.
on:
  schedule:
    - cron: "*/30 * 11-30 6 *"
    - cron: "*/30 * 1-19 7 *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: repo-data-writes
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and merge results
        id: fetch
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-results.mjs

      - name: Commit results
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "bracket-bot"
          git config user.email "actions@github.com"
          git add data/results.json data/results-auto.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto-update match results from football-data.org"
          for i in 1 2 3 4; do
            git push origin main && exit 0
            git pull --rebase origin main
            sleep $((2 ** i))
          done
          git push origin main

      # Pushes made with GITHUB_TOKEN don't fire push-triggered workflows,
      # so kick the Pages deploy explicitly (workflow_dispatch is exempt).
      - name: Trigger site deploy
        if: steps.fetch.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              ...context.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });
