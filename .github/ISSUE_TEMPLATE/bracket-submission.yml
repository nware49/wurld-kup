name: Bracket submission
description: Submit your World Cup 2026 bracket (generated by the predictions site — don't fill this in by hand)
title: "Bracket submission"
labels: ["bracket-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ⚽ **Almost done!** This issue was pre-filled by the predictions site.
        Just press **Create** below — a robot will validate your bracket, save it
        to the pool, and close this issue. Don't edit the payload.

        If the payload box below is empty, go back to the site and use the
        **Submit bracket** button instead of opening this form directly.
  - type: textarea
    id: payload
    attributes:
      label: Bracket payload
      description: Auto-generated. Do not edit.
      render: text
    validations:
      required: true
